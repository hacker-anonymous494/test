<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harta e Transportit - Sherbimijone</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <style>
        .map-page {
            padding: 120px 0 0;
            min-height: 100vh;
            background-color: var(--bg-secondary);
        }
        
        .map-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 120px);
        }
        
        .map-header {
            padding: 20px;
            background-color: var(--bg-primary);
            box-shadow: var(--shadow);
            z-index: 1000;
        }
        
        .map-header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .map-header h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .map-header h1 i {
            color: var(--primary-color);
        }
        
        .map-controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .map-filter-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            color: var(--text-primary);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .map-filter-btn:hover, .map-filter-btn.active {
            background-color: var(--primary-color);
            color: var(--text-light);
            border-color: var(--primary-color);
        }
        
        .map-filter-btn i {
            font-size: 18px;
        }
        
        .map-main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        
        #full-map {
            flex: 1;
            height: 100%;
            z-index: 1;
        }
        
        .map-sidebar {
            width: 350px;
            background-color: var(--bg-primary);
            border-left: 1px solid var(--border-color);
            overflow-y: auto;
            transition: var(--transition);
            z-index: 100;
            box-shadow: -5px 0 15px rgba(0, 0, 0, 0.05);
        }
        
        .map-sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .map-sidebar-header h3 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .close-sidebar {
            background: transparent;
            border: none;
            font-size: 24px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
        }
        
        .close-sidebar:hover {
            color: var(--primary-color);
        }
        
        .sidebar-content {
            padding: 20px;
        }
        
        .station-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .station-item {
            background-color: var(--bg-secondary);
            border-radius: var(--border-radius);
            padding: 15px;
            transition: var(--transition);
            cursor: pointer;
            border: 2px solid transparent;
        }
        
        .station-item:hover {
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }
        
        .station-item.active {
            border-color: var(--primary-color);
            background-color: var(--bg-tertiary);
        }
        
        .station-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .station-name {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 18px;
        }
        
        .station-distance {
            color: var(--text-secondary);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .station-lines {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }
        
        .line-badge {
            background-color: var(--primary-color);
            color: var(--text-light);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .station-info {
            display: flex;
            justify-content: space-between;
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .bus-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .bus-item {
            background-color: var(--bg-secondary);
            border-radius: var(--border-radius);
            padding: 15px;
            transition: var(--transition);
            cursor: pointer;
            border: 2px solid transparent;
        }
        
        .bus-item:hover {
            border-color: var(--secondary-color);
            transform: translateY(-2px);
        }
        
        .bus-item.active {
            border-color: var(--secondary-color);
            background-color: rgba(0, 200, 83, 0.1);
        }
        
        .bus-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .bus-name {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .bus-status {
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 600;
        }
        
        .status-on-time {
            background-color: #4caf50;
            color: white;
        }
        
        .status-delayed {
            background-color: #ff9800;
            color: white;
        }
        
        .status-arriving {
            background-color: #2196f3;
            color: white;
        }
        
        .bus-route {
            color: var(--text-secondary);
            margin-bottom: 10px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .bus-details {
            display: flex;
            justify-content: space-between;
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .no-data {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
        
        .no-data i {
            font-size: 48px;
            margin-bottom: 20px;
            color: var(--border-color);
        }
        
        .toggle-sidebar {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }
        
        .toggle-sidebar:hover {
            background-color: var(--primary-color);
            color: var(--text-light);
            border-color: var(--primary-color);
        }
        
        .sidebar-hidden {
            transform: translateX(100%);
        }
        
        .legend {
            position: absolute;
            bottom: 30px;
            left: 20px;
            background-color: var(--bg-primary);
            border-radius: var(--border-radius);
            padding: 15px;
            box-shadow: var(--shadow);
            z-index: 1000;
            max-width: 250px;
        }
        
        .legend h4 {
            margin-bottom: 10px;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }
        
        .legend-text {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        @media (max-width: 992px) {
            .map-sidebar {
                position: fixed;
                top: 0;
                right: 0;
                height: 100vh;
                width: 100%;
                max-width: 400px;
                transform: translateX(100%);
            }
            
            .map-sidebar.active {
                transform: translateX(0);
            }
            
            .toggle-sidebar {
                display: flex;
            }
            
            .legend {
                max-width: 200px;
                font-size: 12px;
            }
        }
        
        @media (max-width: 768px) {
            .map-header-content {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .map-controls {
                width: 100%;
            }
            
            .map-filter-btn {
                flex: 1;
                justify-content: center;
            }
            
            .legend {
                bottom: 10px;
                left: 10px;
                padding: 10px;
                max-width: 180px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <nav class="navbar">
            <div class="logo-container">
                <div class="logo">
                    <i class="fas fa-bus"></i>
                    <span class="logo-text">Sherbimijone</span>
                </div>
                <div class="tagline">Transporti Juaj në Tiranë</div>
            </div>
            
            <ul class="nav-menu">
                <li class="nav-item"><a href="../index.html" class="nav-link"><i class="fas fa-home"></i> Kryefaqja</a></li>
                <li class="nav-item"><a href="map.html" class="nav-link active"><i class="fas fa-map"></i> Harta</a></li>
                <li class="nav-item"><a href="taxi.html" class="nav-link"><i class="fas fa-taxi"></i> Taksi</a></li>
                <li class="nav-item"><a href="search.html" class="nav-link"><i class="fas fa-search"></i> Kërko</a></li>

            <div class="auth-buttons" id="auth-buttons">
                <a href="login.html" class="btn btn-outline"><i class="fas fa-sign-in-alt"></i> Kyçu</a>

            <div class="theme-toggle">
                <input type="checkbox" id="theme-switch" class="theme-switch">
                <label for="theme-switch" class="theme-label">
                    <i class="fas fa-sun"></i>

                    <span class="theme-ball"></span>

            <div class="hamburger">
                <span class="bar"></span>

                <span class="bar"></span>
            </div>

    <!-- Harta -->
    <main class="map-page">
        <div class="map-container">
            <div class="map-header">
                <div class="map-header-content">
                    <h1><i class="fas fa-map-marked-alt"></i> Harta e Plotë e Transportit</h1>
                    <div class="map-controls">
                        <button class="map-filter-btn active" data-filter="all">
                            <i class="fas fa-layer-group"></i> Të Gjitha
                        </button>
                        <button class="map-filter-btn" data-filter="stations">
                            <i class="fas fa-map-marker-alt"></i> Stacionet
                        </button>
                        <button class="map-filter-btn" data-filter="buses">
                            <i class="fas fa-bus"></i> Autobusët
                        </button>
                        <button class="map-filter-btn" data-filter="routes">
                            <i class="fas fa-route"></i> Rrugët
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="map-main">
                <div id="full-map"></div>
                
                <button class="toggle-sidebar" id="toggle-sidebar-btn">
                    <i class="fas fa-chevron-left"></i>
                </button>
                
                <div class="map-sidebar" id="map-sidebar">
                    <div class="map-sidebar-header">
                        <h3 id="sidebar-title">Stacionet</h3>
                        <button class="close-sidebar" id="close-sidebar-btn">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div class="sidebar-content">
                        <div class="station-list" id="station-list">
                            <!-- Stacionet do të shtohen këtu nga JavaScript -->
                        </div>
                        <div class="bus-list" id="bus-list" style="display: none;">
                            <!-- Autobusët do të shtohen këtu nga JavaScript -->
                        </div>
                    </div>
                </div>
                
                <div class="legend">
                    <h4>Legjenda</h4>
                    <div class="legend-item">
                        <div class="legend-color" style="background-color: #1a73e8;"></div>
                        <div class="legend-text">Stacioni i Autobusëve</div>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background-color: #4caf50;"></div>
                        <div class="legend-text">Autobus në kohë</div>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background-color: #ff9800;"></div>
                        <div class="legend-text">Autobus i vonuar</div>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background-color: #2196f3;"></div>
                        <div class="legend-text">Autobus duke ardhur</div>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background-color: #9c27b0;"></div>
                        <div class="legend-text">Stacioni i Taksive</div>
                    </div>
                </div>
            </div>

    </main>

    <!-- JavaScript -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.js"></script>
    <script src="../script.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script>
      (function() {
        // API base (relative)
        const API_BASE = '/.netlify/functions';

        let map;
        let stopsLayer, busesLayer, routesLayer, taxiStationsLayer;
        let allStops = [];
        let allLines = [];
        let allVehicles = [];
        let currentFilter = 'all';
        let userLocationMarker = null;
        let markerClusterGroup = null;

        // Initialize map
        function initMap() {
          map = L.map('full-map').setView([41.3275, 19.8187], 13);
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19,
          }).addTo(map);

          stopsLayer = L.layerGroup();
          busesLayer = L.layerGroup();
          routesLayer = L.layerGroup();
          taxiStationsLayer = L.layerGroup(); // can be extended later

          markerClusterGroup = L.markerClusterGroup();
          map.addLayer(markerClusterGroup);

          // Try to get user location
          if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
              (pos) => {
                const { latitude, longitude } = pos.coords;
                userLocationMarker = L.marker([latitude, longitude], {
                  icon: L.divIcon({
                    html: '<div style="background:#ff0000; width:20px; height:20px; border-radius:50%; border:3px solid white; box-shadow:0 0 10px rgba(0,0,0,0.3);"></div>',
                    iconSize: [20, 20],
                    iconAnchor: [10, 10],
                  }),
                })
                  .addTo(map)
                  .bindPopup('Ju jeni këtu')
                  .openPopup();
                map.setView([latitude, longitude], 15);
              },
              (err) => console.warn('Geolocation error:', err)
            );
          }

          // Load data
          loadAllData();
        }

        async function loadAllData() {
          try {
            const [stopsRes, linesRes, vehiclesRes] = await Promise.all([
              fetch(`${API_BASE}/get-stops`),
              fetch(`${API_BASE}/get-lines?include_stops=true`),
              fetch(`${API_BASE}/get-vehicles`),
            ]);
            if (!stopsRes.ok) throw new Error('Failed to fetch stops');
            if (!linesRes.ok) throw new Error('Failed to fetch lines');
            if (!vehiclesRes.ok) throw new Error('Failed to fetch vehicles');

            const stopsData = await stopsRes.json();
            const linesData = await linesRes.json();
            const vehiclesData = await vehiclesRes.json();

            allStops = stopsData.stops || [];
            allLines = linesData.lines || [];
            allVehicles = vehiclesData.vehicles || [];

            renderStops();
            renderRoutes();
            renderVehicles();
            populateStationList();
            populateBusList();
          } catch (err) {
            console.error('Error loading data:', err);
            document.getElementById('station-list').innerHTML = '<div class="no-data">Error loading data</div>';
          }
        }

        function renderStops() {
          markerClusterGroup.clearLayers();
          allStops.forEach((stop) => {
            const marker = L.marker([stop.lat, stop.lng], {
              icon: L.icon({
                iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
                iconSize: [25, 41],
                iconAnchor: [12, 41],
              }),
            });
            marker.bindPopup(`
              <div style="min-width:200px">
                <h3>${escapeHtml(stop.name)}</h3>
                <p><strong>ID:</strong> ${stop.id}</p>
                <button class="btn btn-primary" onclick="window.viewStationDetails(${stop.id})">Detaje</button>
              </div>
            `);
            marker.on('click', () => highlightStationInSidebar(stop.id));
            markerClusterGroup.addLayer(marker);
          });
        }

        function renderRoutes() {
          routesLayer.clearLayers();
          allLines.forEach((line) => {
            if (!line.stops || line.stops.length < 2) return;
            const coordinates = line.stops
              .map((s) => [s.lat, s.lng])
              .filter((c) => c[0] && c[1]);
            if (coordinates.length < 2) return;
            const polyline = L.polyline(coordinates, {
              color: line.color_hex || '#1a73e8',
              weight: 4,
              opacity: 0.7,
            }).bindPopup(`<strong>${line.line_number} - ${escapeHtml(line.name || '')}</strong>`);
            routesLayer.addLayer(polyline);
          });
        }

        function renderVehicles() {
          busesLayer.clearLayers();
          allVehicles.forEach((vehicle) => {
            const statusClass = 'status-on-time';
            const iconColor = vehicle.line?.color_hex || '#4caf50';
            const marker = L.marker([vehicle.lat, vehicle.lng], {
              icon: L.divIcon({
                html: `<div style="background:${iconColor}; width:24px; height:24px; border-radius:50%; border:3px solid white; box-shadow:0 0 10px rgba(0,0,0,0.3);"></div>`,
                iconSize: [24, 24],
                iconAnchor: [12, 12],
              }),
            });
            marker.bindPopup(`
              <div>
                <strong>${escapeHtml(vehicle.line?.line_number || 'Autobus')}</strong><br>
                ${escapeHtml(vehicle.line?.name || '')}<br>
                <span class="bus-status ${statusClass}">Në lëvizje</span>
              </div>
            `);
            marker.on('click', () => highlightBusInSidebar(vehicle.id));
            busesLayer.addLayer(marker);
          });
        }

        function populateStationList() {
          const container = document.getElementById('station-list');
          if (!allStops.length) {
            container.innerHTML = '<div class="no-data"><i class="fas fa-map-marker-alt"></i><p>Nuk u gjetën stacione</p></div>';
            return;
          }
          let html = '';
          allStops.forEach((stop) => {
            const linesForStop = allLines.filter((line) => line.stops?.some((s) => s.stop_id === stop.id));
            const lineBadges = linesForStop
              .map((l) => `<span class="line-badge" style="background:${l.color_hex || '#1a73e8'}">${escapeHtml(l.line_number || '')}</span>`)
              .join('');
            html += `
              <div class="station-item" data-station-id="${stop.id}" onclick="window.focusOnStation(${stop.lat}, ${stop.lng}, ${stop.id})">
                <div class="station-header">
                  <div class="station-name">${escapeHtml(stop.name)}</div>
                  <div class="station-distance"><i class="fas fa-walking"></i> ~${Math.round(stop.distanceM || 0)}m</div>
                </div>
                <div class="station-lines">${lineBadges}</div>
                <div class="station-info">
                  <div><i class="fas fa-bus"></i> ${linesForStop.length} linja</div>
                </div>
              </div>`;
          });
          container.innerHTML = html;
        }

        function populateBusList() {
          const container = document.getElementById('bus-list');
          if (!allVehicles.length) {
            container.innerHTML = '<div class="no-data"><i class="fas fa-bus"></i><p>Nuk ka autobusë aktivë</p></div>';
            return;
          }
          let html = '';
          allVehicles.forEach((vehicle) => {
            const line = vehicle.line || {};
            html += `
              <div class="bus-item" data-bus-id="${vehicle.id}" onclick="window.focusOnBus(${vehicle.lat}, ${vehicle.lng}, ${vehicle.id})">
                <div class="bus-header">
                  <div class="bus-name"><i class="fas fa-bus"></i> ${escapeHtml(line.line_number || 'Autobus')}</div>
                  <div class="bus-status status-on-time">Në lëvizje</div>
                </div>
                <div class="bus-route"><i class="fas fa-route"></i> ${escapeHtml(line.name || '')}</div>
                <div class="bus-details">
                  <span><i class="fas fa-clock"></i> Përditësuar tani</span>
                </div>
              </div>`;
          });
          container.innerHTML = html;
        }

        // Helper functions
        function escapeHtml(str) {
          if (!str) return '';
          return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
          });
        }

        // Sidebar and filtering
        function applyFilter(filter) {
          currentFilter = filter;
          if (filter === 'all' || filter === 'stations') {
            if (!map.hasLayer(markerClusterGroup)) map.addLayer(markerClusterGroup);
            document.getElementById('station-list').style.display = 'block';
            document.getElementById('sidebar-title').innerText = 'Stacionet';
          } else {
            if (map.hasLayer(markerClusterGroup)) map.removeLayer(markerClusterGroup);
            document.getElementById('station-list').style.display = 'none';
          }
          if (filter === 'all' || filter === 'buses') {
            if (!map.hasLayer(busesLayer)) busesLayer.addTo(map);
            document.getElementById('bus-list').style.display = 'block';
            if (filter === 'buses') document.getElementById('sidebar-title').innerText = 'Autobusët';
          } else {
            if (map.hasLayer(busesLayer)) map.removeLayer(busesLayer);
            document.getElementById('bus-list').style.display = 'none';
          }
          if (filter === 'all' || filter === 'routes') {
            if (!map.hasLayer(routesLayer)) routesLayer.addTo(map);
            if (filter === 'routes') document.getElementById('sidebar-title').innerText = 'Linjat';
          } else {
            if (map.hasLayer(routesLayer)) map.removeLayer(routesLayer);
          }
        }

        // Expose global functions for inline onclick
        window.focusOnStation = (lat, lng, id) => {
          map.setView([lat, lng], 16);
          highlightStationInSidebar(id);
        };
        window.focusOnBus = (lat, lng, id) => {
          map.setView([lat, lng], 16);
          highlightBusInSidebar(id);
        };
        window.viewStationDetails = (id) => {
          alert(`Detaje për stacionin ID ${id}\n(Funksionalitet në zhvillim)`);
        };
        window.trackBus = (id) => {
          alert(`Ndjekja e autobusit ID ${id}\n(Funksionalitet në zhvillim)`);
        };
        window.bookTaxiFromStation = (stationName) => {
          window.location.href = `taxi.html?station=${encodeURIComponent(stationName)}`;
        };

        function highlightStationInSidebar(id) {
          document.querySelectorAll('.station-item').forEach((el) => el.classList.remove('active'));
          const target = document.querySelector(`.station-item[data-station-id="${id}"]`);
          if (target) {
            target.classList.add('active');
            target.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          }
        }
        function highlightBusInSidebar(id) {
          document.querySelectorAll('.bus-item').forEach((el) => el.classList.remove('active'));
          const target = document.querySelector(`.bus-item[data-bus-id="${id}"]`);
          if (target) {
            target.classList.add('active');
            target.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          }
        }

        // Sidebar toggle
        function initSidebar() {
          const toggleBtn = document.getElementById('toggle-sidebar-btn');
          const closeBtn = document.getElementById('close-sidebar-btn');
          const sidebar = document.getElementById('map-sidebar');
          toggleBtn?.addEventListener('click', () => {
            sidebar.classList.toggle('active');
            const icon = toggleBtn.querySelector('i');
            if (sidebar.classList.contains('active')) {
              icon.classList.remove('fa-chevron-left');
              icon.classList.add('fa-chevron-right');
            } else {
              icon.classList.remove('fa-chevron-right');
              icon.classList.add('fa-chevron-left');
            }
          });
          closeBtn?.addEventListener('click', () => {
            sidebar.classList.remove('active');
            toggleBtn.querySelector('i').classList.remove('fa-chevron-right');
            toggleBtn.querySelector('i').classList.add('fa-chevron-left');
          });
        }

        // Filter buttons
        function initControls() {
          document.querySelectorAll('.map-filter-btn').forEach((btn) => {
            btn.addEventListener('click', function() {
              document.querySelectorAll('.map-filter-btn').forEach((b) => b.classList.remove('active'));
              this.classList.add('active');
              applyFilter(this.getAttribute('data-filter'));
            });
          });
        }

        // Refresh vehicles every 10 seconds (optional)
        function startLiveRefresh() {
          setInterval(async () => {
            try {
              const res = await fetch(`${API_BASE}/get-vehicles`);
              const data = await res.json();
              allVehicles = data.vehicles || [];
              renderVehicles();
              populateBusList();
            } catch (err) {
              console.warn('Live refresh failed', err);
            }
          }, 10000);
        }

        // Start everything
        document.addEventListener('DOMContentLoaded', () => {
          initMap();
          initSidebar();
          initControls();
          startLiveRefresh();
        });
      })();
    </script>
</body>
</html>
